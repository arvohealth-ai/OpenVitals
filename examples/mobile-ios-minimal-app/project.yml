name: OpenVitalsHealthKitDemo
options:
  bundleIdPrefix: ai.openvitals
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    OPENVITALS_APPLE_TEAM_ID: ""
    OPENVITALS_IOS_BUNDLE_ID: "ai.openvitals.healthkitdemo"
    OPENVITALS_WATCH_BUNDLE_ID: "ai.openvitals.healthkitdemo.watch"
    DEVELOPMENT_TEAM: "$(OPENVITALS_APPLE_TEAM_ID)"
    CODE_SIGN_STYLE: Automatic

schemes:
  OpenVitalsHealthKitDemo:
    shared: true
    build:
      targets:
        OpenVitalsHealthKitDemo: all
  OpenVitalsWatchDemo:
    shared: true
    build:
      targets:
        OpenVitalsWatchDemo: all

targets:
  OpenVitalsHealthKitDemo:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: OpenVitalsCollector.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "$(OPENVITALS_IOS_BUNDLE_ID)"
        CODE_SIGN_ENTITLEMENTS: OpenVitalsHealthKitDemo.entitlements
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone:
          - UIInterfaceOrientationPortrait
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: OpenVitals
        CFBundleShortVersionString: "0.6.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIBackgroundModes:
          - healthkit
        NSHealthShareUsageDescription: OpenVitals reads HealthKit data to upload your health timeline.
        NSHealthUpdateUsageDescription: OpenVitals starts workout sessions only when you test live Apple Watch heart-rate capture.
        NSLocalNetworkUsageDescription: OpenVitals connects to your local OpenVitals API during hardware testing.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true

  OpenVitalsWatchDemo:
    type: application
    platform: watchOS
    sources:
      - path: WatchApp
      - path: OpenVitalsCollector.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "$(OPENVITALS_WATCH_BUNDLE_ID)"
        CODE_SIGN_ENTITLEMENTS: OpenVitalsWatchDemo.entitlements
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: OpenVitals
        CFBundleShortVersionString: "0.6.0"
        CFBundleVersion: "1"
        WKApplication: true
        WKCompanionAppBundleIdentifier: "$(OPENVITALS_IOS_BUNDLE_ID)"
        WKBackgroundModes:
          - workout-processing
        NSHealthShareUsageDescription: OpenVitals reads heart rate during a workout session.
        NSHealthUpdateUsageDescription: OpenVitals starts workout sessions only when you test live heart-rate capture.
        NSLocalNetworkUsageDescription: OpenVitals connects to your local OpenVitals API during hardware testing.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
