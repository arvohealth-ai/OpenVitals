name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate docs
        run: pnpm docs:generate

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Smoke E2E
        run: pnpm smoke:e2e

      - name: Typecheck
        run: pnpm typecheck
